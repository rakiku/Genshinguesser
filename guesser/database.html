<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genshin Guesser — データベース</title>
  <meta name="description" content="原神キャラクター・武器データベース。詳細な項目で絞り込み可能。">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap">
  <style>
    /* ---- Database extra styles ---- */
    .db-header { display:flex; align-items:center; gap:.6rem; margin-bottom:1rem; flex-wrap:wrap; }
    .db-tab { padding:.35rem .9rem; border:2px solid var(--border); border-radius:6px; background:transparent; color:#fff; font-family:inherit; font-size:.85rem; cursor:pointer; }
    .db-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    
    /* ---- 高機能マルチフィルター用のグリッドレイアウト ---- */
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 0.6rem;
      margin-bottom: 1.2rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
    }
    .filter-item {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .filter-item label {
      font-size: 0.72rem;
      color: var(--text-muted, #95a5a6);
      font-weight: 700;
    }
    .filter-select {
      padding: 0.35rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #ffffff; /* 背景を白に固定 */
      color: #000000;      /* 文字色を黒に固定 */
      font-size: 0.8rem;
      cursor: pointer;
    }
    /* プルダウンメニュー内の選択肢も確実に黒文字にする */
    .filter-select option {
      background: #ffffff;
      color: #000000;
    }
    .filter-input {
      padding: 0.35rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #ffffff; /* 背景を白に固定 */
      color: #000000;      /* 文字色を黒に固定 */
      font-size: 0.8rem;
    }
    .filter-input:focus {
      border-color: var(--accent);
      outline: none;
    }
    .filter-btn-row {
      grid-column: 1 / -1;
      display: flex;
      justify-content: flex-end;
      margin-top: 0.4rem;
    }
    .reset-btn {
      padding: .45rem 1rem;
      background: #7f8c8d;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: .8rem;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.15s;
    }
    .reset-btn:hover {
      background: #95a5a6;
    }

    /* ---- カード・グリッド表示 ---- */
    .db-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:.75rem; }
    .db-card { background:var(--bg-card); border:1.5px solid var(--border); border-radius:10px; padding:.7rem; text-align:left; cursor:pointer; transition:border-color .15s; font-size:.88rem; color:#fff; display:flex; flex-direction:column; gap:.55rem; }
    .db-card:hover, .db-card.active { border-color:var(--accent); }
    .db-card .card-thumb-wrap { aspect-ratio:1/1; border-radius:8px; background:rgba(255,255,255,.05); display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .db-card .card-thumb { width:100%; height:100%; object-fit:cover; }
    .db-card .card-thumb-fallback { color:#fff; font-size:2rem; }
    .db-card .card-name { color:#fff; font-weight:700; line-height:1.4; }
    .rarity-5 { border-color:#e8a030; }
    .rarity-4 { border-color:#9966cc; }
    .rarity-3 { border-color:#4da3ff; }
    .rarity-2 { border-color:#3aaa5a; }
    .rarity-1 { border-color:#f5f7fb; }
    .empty-msg { text-align:center; color:#fff; padding:2rem; }
    
    /* ---- 詳細モーダル ---- */
    .db-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.72); z-index:300; }
    .db-modal { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:min(92vw,720px); max-height:88vh; overflow-y:auto; background:var(--surface); border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow); z-index:301; padding:1rem; color:#fff; }
    .db-modal-head { display:flex; align-items:center; gap:.8rem; margin-bottom:1rem; }
    .db-modal-title { font-size:1.05rem; color:#fff; }
    .db-modal-close { margin-left:auto; background:transparent; border:1px solid var(--border); border-radius:8px; color:#fff; cursor:pointer; font-family:inherit; padding:.35rem .7rem; }
    .db-modal-body { display:grid; gap:1rem; }
    .db-modal-hero { display:flex; gap:1rem; align-items:center; flex-wrap:wrap; }
    .db-modal-image-wrap { width:min(180px,100%); aspect-ratio:1/1; border-radius:12px; overflow:hidden; background:rgba(255,255,255,.05); display:flex; align-items:center; justify-content:center; }
    .db-modal-image { width:100%; height:100%; object-fit:cover; }
    .db-modal-fallback { font-size:3rem; color:#fff; }
    .db-modal-summary { display:grid; gap:.35rem; }
    .db-modal-summary p { color:#fff; }
    .db-detail-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:.5rem .8rem; }
    .db-detail-item { font-size:.82rem; }
    .db-detail-item b { color:#fff; display:block; margin-bottom:.15rem; font-weight:700; }
    .db-detail-item span { color:#fff; }
    @media (max-width: 560px) {
      .db-modal { left:.8rem; right:.8rem; width:auto; transform:translate(0,-50%); }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1 class="app-title">📚 データベース</h1>
    <nav class="header-actions">
      <a href="../index.html" class="back-link icon-btn">← メニュー</a>
    </nav>
  </header>

  <main class="app-main" role="main">

    <!-- タブ切替 -->
    <div class="db-header">
      <button class="db-tab active" data-tab="character">👤 キャラクター</button>
      <button class="db-tab" data-tab="weapon">⚔ 武器</button>
    </div>

    <!-- キャラクターフィルタ（詳細マルチ構成） -->
    <div id="charFilters">
      <div class="filter-grid">
        <div class="filter-item">
          <label for="char-name-input">名前</label>
          <input id="char-name-input" class="filter-input" type="text" placeholder="名前検索">
        </div>
        <div class="filter-item">
          <label for="char-country">国</label>
          <select id="char-country" class="filter-select"><option value="all">すべて</option></select>
        </div>
        <div class="filter-item">
          <label for="char-weapon">武器種</label>
          <select id="char-weapon" class="filter-select"><option value="all">すべて</option></select>
        </div>
        <div class="filter-item">
          <label for="char-element">元素</label>
          <select id="char-element" class="filter-select"><option value="all">すべて</option></select>
        </div>
        <div class="filter-item">
          <label for="char-birthMonth">誕生月</label>
          <select id="char-birthMonth" class="filter-select"><option value="all">すべて</option></select>
        </div>
        <div class="filter-item">
          <label for="char-releaseVersion">実装Ver</label>
          <select id="char-releaseVersion" class="filter-select"><option value="all">すべて</option></select>
        </div>
        <div class="filter-item">
          <label for="char-rarity">レアリティ</label>
          <select id="char-rarity" class="filter-select"><option value="all">すべて</option></select>
        </div>
        <div class="filter-item">
          <label for="char-body">体型</label>
          <select id="char-body" class="filter-select"><option value="all">すべて</option></select>
        </div>
        <div class="filter-item">
          <label for="char-role">役割</label>
          <select id="char-role" class="filter-select"><option value="all">すべて</option></select>
        </div>
        <div class="filter-item">
          <label for="char-energy">エネルギー</label>
          <select id="char-energy" class="filter-select"><option value="all">すべて</option></select>
        </div>
        <div class="filter-item">
          <label for="char-talentBoss">ボス素材</label>
          <select id="char-talentBoss" class="filter-select"><option value="all">すべて</option></select>
        </div>
        <div class="filter-item">
          <label for="char-localSpecialty">特産品</label>
          <select id="char-localSpecialty" class="filter-select"><option value="all">すべて</option></select>
        </div>
        <div class="filter-item">
          <label for="char-enemyMaterial">敵素材</label>
          <select id="char-enemyMaterial" class="filter-select"><option value="all">すべて</option></select>
        </div>
        <div class="filter-item">
          <label for="char-ascensionStat">突破ステータス</label>
          <select id="char-ascensionStat" class="filter-select"><option value="all">すべて</option></select>
        </div>
        <div class="filter-item">
          <label for="char-talentBook">天賦本</label>
          <select id="char-talentBook" class="filter-select"><option value="all">すべて</option></select>
        </div>
        <div class="filter-item">
          <label for="char-talentWeekly">週ボス素材</label>
          <select id="char-talentWeekly" class="filter-select"><option value="all">すべて</option></select>
        </div>
        <div class="filter-item">
          <label for="char-specialDish">料理種別</label>
          <select id="char-specialDish" class="filter-select"><option value="all">すべて</option></select>
        </div>
        <div class="filter-item">
          <label for="char-distributed">配布</label>
          <select id="char-distributed" class="filter-select">
            <option value="all">すべて</option>
            <option value="true">あり</option>
            <option value="false">なし</option>
          </select>
        </div>
        <div class="filter-item">
          <label for="char-trainingRoad">鍛錬の道</label>
          <select id="char-trainingRoad" class="filter-select">
            <option value="all">すべて</option>
            <option value="true">あり</option>
            <option value="false">なし</option>
          </select>
        </div>
        <div class="filter-item">
          <label for="char-trace">軌跡</label>
          <select id="char-trace" class="filter-select">
            <option value="all">すべて</option>
            <option value="true">あり</option>
            <option value="false">なし</option>
          </select>
        </div>
        <div class="filter-item">
          <label for="char-costume">別衣装</label>
          <select id="char-costume" class="filter-select">
            <option value="all">すべて</option>
            <option value="true">あり</option>
            <option value="false">なし</option>
          </select>
        </div>
        <div class="filter-item">
          <label for="charQuery">キャラ名を検索</label>
          <input id="charQuery" class="filter-input" type="text" placeholder="全項目を対象に検索">
        </div>
        <div class="filter-btn-row">
          <button id="char-reset-btn" class="reset-btn" type="button">フィルターをリセット</button>
        </div>
      </div>
    </div>

    <!-- 武器フィルタ（詳細マルチ構成） -->
    <div id="weaponFilters" style="display:none;">
      <div class="filter-grid">
        <div class="filter-item">
          <label for="w-name-input">名前</label>
          <input id="w-name-input" class="filter-input" type="text" placeholder="名前検索">
        </div>
        <div class="filter-item">
          <label for="w-type">武器種</label>
          <select id="w-type" class="filter-select"><option value="all">すべて</option></select>
        </div>
        <div class="filter-item">
          <label for="w-rarity">レアリティ</label>
          <select id="w-rarity" class="filter-select"><option value="all">すべて</option></select>
        </div>
        <div class="filter-item">
          <label for="w-ascensionStat">突破ステータス</label>
          <select id="w-ascensionStat" class="filter-select"><option value="all">すべて</option></select>
        </div>
        <div class="filter-item">
          <label for="w-releaseVersion">実装Ver</label>
          <select id="w-releaseVersion" class="filter-select"><option value="all">すべて</option></select>
        </div>
        <div class="filter-item">
          <label for="w-distributed">配布武器</label>
          <select id="w-distributed" class="filter-select">
            <option value="all">すべて</option>
            <option value="true">あり</option>
            <option value="false">なし</option>
          </select>
        </div>
        <div class="filter-item">
          <label for="weaponQuery">全要素キーワード</label>
          <input id="weaponQuery" class="filter-input" type="text" placeholder="全項目を対象に検索">
        </div>
        <div class="filter-btn-row">
          <button id="w-reset-btn" class="reset-btn" type="button">フィルターをリセット</button>
        </div>
      </div>
    </div>

    <!-- グリッド表示 -->
    <div class="db-grid" id="dbGrid"></div>

  </main>

  <footer class="app-footer">
    <p><a href="../index.html">← メニューへ戻る</a></p>
  </footer>

  <div class="db-modal-overlay hidden" id="detailOverlay" aria-hidden="true"></div>
  <section class="db-modal hidden" id="detailModal" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
    <div class="db-modal-head">
      <h2 class="db-modal-title" id="detailTitle">詳細情報</h2>
      <button class="db-modal-close" id="detailClose" type="button" aria-label="閉じる">閉じる</button>
    </div>
    <div class="db-modal-body">
      <div class="db-modal-hero">
        <div class="db-modal-image-wrap" id="detailImageWrap"></div>
        <div class="db-modal-summary" id="detailSummary"></div>
      </div>
      <div class="db-detail-grid" id="detailGrid"></div>
    </div>
  </section>

  <script src="data.js"></script>
  <script>
    'use strict';
    let currentTab = 'character';
    
    // フィルターの初期ステータス
    const activeFilters = { 
      charName: '',
      charCountry: 'all',
      charWeapon: 'all',
      charElement: 'all',
      charBirthMonth: 'all',
      charReleaseVersion: 'all',
      charRarity: 'all',
      charBody: 'all',
      charRole: 'all',
      charEnergy: 'all',
      charTalentBoss: 'all',
      charLocalSpecialty: 'all',
      charEnemyMaterial: 'all',
      charAscensionStat: 'all',
      charTalentBook: 'all',
      charTalentWeekly: 'all',
      charSpecialDish: 'all',
      charDistributed: 'all',
      charTrainingRoad: 'all',
      charTrace: 'all',
      charCostume: 'all',
      charQuery: '',
      
      wName: '',
      wType: 'all',
      wRarity: 'all',
      wAscensionStat: 'all',
      wReleaseVersion: 'all',
      wDistributed: 'all',
      wQuery: ''
    };
    
    const QUERY_DEBOUNCE_MS = 120;
    let queryDebounceTimer = null;

    const jpSort = (list) => [...list].sort((a, b) => String(a).localeCompare(String(b), 'ja'));

    document.addEventListener('DOMContentLoaded', () => {
      bindTabs();
      initAdvancedFilters();
      bindAdvancedFilters();
      bindDetailModal();
      renderGrid();
    });

    function bindTabs() {
      document.querySelectorAll('.db-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          currentTab = btn.dataset.tab;
          document.querySelectorAll('.db-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === currentTab));
          document.getElementById('charFilters').style.display = currentTab === 'character' ? '' : 'none';
          document.getElementById('weaponFilters').style.display = currentTab === 'weapon' ? '' : 'none';
          renderGrid();
        });
      });
    }

    /** 
     * CHARACTERS / WEAPONS の定義データから自動的にユニークな絞り込み用選択肢を抽出し、
     * HTML上のプルダウンメニュー（<select>）に反映する
     */
    function initAdvancedFilters() {
      function parseReleaseVersionNum(str) {
        if (typeof parseReleaseVersion === 'function') return parseReleaseVersion(str);
        return parseFloat(str) || 0;
      }

      // キャラクター選択肢の抽出
      populateSelect('char-country', jpSort([...new Set(CHARACTERS.map(c => c.country))].filter(Boolean)));
      populateSelect('char-weapon', jpSort([...new Set(CHARACTERS.map(c => c.weapon))].filter(Boolean)));
      populateSelect('char-element', jpSort([...new Set(CHARACTERS.map(c => c.element))].filter(Boolean)));
      
      // 誕生月のソート（「1月」「2月」...「12月」の数字順）
      const months = [...new Set(CHARACTERS.map(c => c.birthMonth))].filter(Boolean).sort((a, b) => {
        const aNum = parseInt(a.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xfee0))) || 99;
        const bNum = parseInt(b.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xfee0))) || 99;
        return aNum - bNum;
      });
      populateSelect('char-birthMonth', months);
      
      // 実装バージョンのソート
      const versions = [...new Set(CHARACTERS.map(c => c.releaseVersionLabel))].filter(Boolean).sort((a, b) => parseReleaseVersionNum(a) - parseReleaseVersionNum(b));
      populateSelect('char-releaseVersion', versions);
      
      populateSelect('char-rarity', [...new Set(CHARACTERS.map(c => c.rarity))].filter(v => v !== undefined).sort((a, b) => b - a).map(String));
      populateSelect('char-body', jpSort([...new Set(CHARACTERS.map(c => c.bodyLabel))].filter(Boolean)));
      populateSelect('char-role', jpSort([...new Set(CHARACTERS.flatMap(c => c.role))].filter(Boolean)));
      populateSelect('char-energy', [...new Set(CHARACTERS.map(c => c.energy))].filter(v => v !== undefined).sort((a, b) => a - b).map(String));
      populateSelect('char-talentBoss', jpSort([...new Set(CHARACTERS.map(c => c.talentBoss))].filter(Boolean)));
      populateSelect('char-localSpecialty', jpSort([...new Set(CHARACTERS.map(c => c.localSpecialty))].filter(Boolean)));
      populateSelect('char-enemyMaterial', jpSort([...new Set(CHARACTERS.map(c => c.enemyMaterial))].filter(Boolean)));
      populateSelect('char-ascensionStat', jpSort([...new Set(CHARACTERS.map(c => c.ascensionStat))].filter(Boolean)));
      populateSelect('char-talentBook', jpSort([...new Set(CHARACTERS.map(c => c.talentBook))].filter(Boolean)));
      populateSelect('char-talentWeekly', jpSort([...new Set(CHARACTERS.map(c => c.talentWeekly))].filter(Boolean)));
      populateSelect('char-specialDish', jpSort([...new Set(CHARACTERS.map(c => c.specialDish))].filter(Boolean)));

      // 武器選択肢の抽出
      populateSelect('w-type', jpSort([...new Set(WEAPONS.map(w => w.weaponType))].filter(Boolean)));
      populateSelect('w-rarity', [...new Set(WEAPONS.map(w => w.rarity))].filter(v => v !== undefined).sort((a, b) => b - a).map(String));
      populateSelect('w-ascensionStat', jpSort([...new Set(WEAPONS.map(w => w.ascensionStat))].filter(Boolean)));
      
      const wVersions = [...new Set(WEAPONS.map(w => w.releaseVersionLabel))].filter(Boolean).sort((a, b) => parseReleaseVersionNum(a) - parseReleaseVersionNum(b));
      populateSelect('w-releaseVersion', wVersions);
    }

    function populateSelect(id, values) {
      const select = document.getElementById(id);
      if (!select) return;
      select.innerHTML = '<option value="all">すべて</option>';
      values.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v;
        opt.textContent = v.includes('★') ? v : (id.includes('rarity') || id.includes('Rarity') ? `★${v}` : v);
        select.appendChild(opt);
      });
    }

    /** フィルターイベントの紐付け */
    function bindAdvancedFilters() {
      // テキスト入力の監視
      document.getElementById('char-name-input')?.addEventListener('input', e => {
        activeFilters.charName = e.target.value.trim().toLowerCase();
        scheduleRenderGrid();
      });
      document.getElementById('w-name-input')?.addEventListener('input', e => {
        activeFilters.wName = e.target.value.trim().toLowerCase();
        scheduleRenderGrid();
      });
      document.getElementById('charQuery')?.addEventListener('input', e => {
        activeFilters.charQuery = e.target.value.trim().toLowerCase();
        scheduleRenderGrid();
      });
      document.getElementById('weaponQuery')?.addEventListener('input', e => {
        activeFilters.wQuery = e.target.value.trim().toLowerCase();
        scheduleRenderGrid();
      });

      // キャラクター側セレクトボックスの監視
      const charFields = [
        'country', 'weapon', 'element', 'birthMonth', 'releaseVersion',
        'rarity', 'body', 'role', 'energy', 'talentBoss', 'localSpecialty',
        'enemyMaterial', 'ascensionStat', 'talentBook', 'talentWeekly',
        'specialDish', 'distributed', 'trainingRoad', 'trace', 'costume'
      ];
      charFields.forEach(field => {
        const id = 'char-' + field;
        const el = document.getElementById(id);
        el?.addEventListener('change', () => {
          activeFilters['char' + field.charAt(0).toUpperCase() + field.slice(1)] = el.value;
          renderGrid();
        });
      });

      // 武器側セレクトボックスの監視
      const wFields = ['type', 'rarity', 'ascensionStat', 'releaseVersion', 'distributed'];
      wFields.forEach(field => {
        const id = 'w-' + field;
        const el = document.getElementById(id);
        el?.addEventListener('change', () => {
          activeFilters['w' + field.charAt(0).toUpperCase() + field.slice(1)] = el.value;
          renderGrid();
        });
      });

      // リセットボタン
      document.getElementById('char-reset-btn')?.addEventListener('click', () => resetAllFilters('character'));
      document.getElementById('w-reset-btn')?.addEventListener('click', () => resetAllFilters('weapon'));
    }

    /** 各Tabのフィルターリセット処理 */
    function resetAllFilters(tab) {
      if (tab === 'character') {
        const charFields = [
          'country', 'weapon', 'element', 'birthMonth', 'releaseVersion',
          'rarity', 'body', 'role', 'energy', 'talentBoss', 'localSpecialty',
          'enemyMaterial', 'ascensionStat', 'talentBook', 'talentWeekly',
          'specialDish', 'distributed', 'trainingRoad', 'trace', 'costume'
        ];
        charFields.forEach(field => {
          const id = 'char-' + field;
          const el = document.getElementById(id);
          if (el) el.value = 'all';
          activeFilters['char' + field.charAt(0).toUpperCase() + field.slice(1)] = 'all';
        });
        const nameInput = document.getElementById('char-name-input');
        if (nameInput) nameInput.value = '';
        activeFilters.charName = '';

        const queryInput = document.getElementById('charQuery');
        if (queryInput) queryInput.value = '';
        activeFilters.charQuery = '';
      } else {
        const wFields = ['type', 'rarity', 'ascensionStat', 'releaseVersion', 'distributed'];
        wFields.forEach(field => {
          const id = 'w-' + field;
          const el = document.getElementById(id);
          if (el) el.value = 'all';
          activeFilters['w' + field.charAt(0).toUpperCase() + field.slice(1)] = 'all';
        });
        const nameInput = document.getElementById('w-name-input');
        if (nameInput) nameInput.value = '';
        activeFilters.wName = '';

        const queryInput = document.getElementById('weaponQuery');
        if (queryInput) queryInput.value = '';
        activeFilters.wQuery = '';
      }
      renderGrid();
    }

    function scheduleRenderGrid() {
      if (queryDebounceTimer) clearTimeout(queryDebounceTimer);
      queryDebounceTimer = setTimeout(() => {
        queryDebounceTimer = null;
        renderGrid();
      }, QUERY_DEBOUNCE_MS);
    }

    /** グリッド再描画（高機能絞り込み） */
    function renderGrid() {
      const grid = document.getElementById('dbGrid');
      grid.innerHTML = '';
      let items = [];
      
      if (currentTab === 'character') {
        items = CHARACTERS.filter(c => {
          if (activeFilters.charName && !c.name.toLowerCase().includes(activeFilters.charName)) return false;
          if (activeFilters.charCountry !== 'all' && c.country !== activeFilters.charCountry) return false;
          if (activeFilters.charWeapon !== 'all' && c.weapon !== activeFilters.charWeapon) return false;
          if (activeFilters.charElement !== 'all' && c.element !== activeFilters.charElement) return false;
          if (activeFilters.charBirthMonth !== 'all' && c.birthMonth !== activeFilters.charBirthMonth) return false;
          if (activeFilters.charReleaseVersion !== 'all' && c.releaseVersionLabel !== activeFilters.charReleaseVersion) return false;
          if (activeFilters.charRarity !== 'all' && String(c.rarity) !== activeFilters.charRarity) return false;
          if (activeFilters.charBody !== 'all' && c.bodyLabel !== activeFilters.charBody) return false;
          if (activeFilters.charRole !== 'all' && !c.role.includes(activeFilters.charRole)) return false;
          if (activeFilters.charEnergy !== 'all' && String(c.energy) !== activeFilters.charEnergy) return false;
          if (activeFilters.charTalentBoss !== 'all' && c.talentBoss !== activeFilters.charTalentBoss) return false;
          if (activeFilters.charLocalSpecialty !== 'all' && c.localSpecialty !== activeFilters.charLocalSpecialty) return false;
          if (activeFilters.charEnemyMaterial !== 'all' && c.enemyMaterial !== activeFilters.charEnemyMaterial) return false;
          if (activeFilters.charAscensionStat !== 'all' && c.ascensionStat !== activeFilters.charAscensionStat) return false;
          if (activeFilters.charTalentBook !== 'all' && c.talentBook !== activeFilters.charTalentBook) return false;
          if (activeFilters.charTalentWeekly !== 'all' && c.talentWeekly !== activeFilters.charTalentWeekly) return false;
          if (activeFilters.charSpecialDish !== 'all' && c.specialDish !== activeFilters.charSpecialDish) return false;
          if (activeFilters.charDistributed !== 'all' && String(c.distributed) !== activeFilters.charDistributed) return false;
          if (activeFilters.charTrainingRoad !== 'all' && String(c.trainingRoad) !== activeFilters.charTrainingRoad) return false;
          if (activeFilters.charTrace !== 'all' && String(c.trace) !== activeFilters.charTrace) return false;
          if (activeFilters.charCostume !== 'all' && String(c.costume) !== activeFilters.charCostume) return false;
          
          if (!matchesAllFields(c, activeFilters.charQuery)) return false;
          return true;
        });
      } else {
        items = WEAPONS.filter(w => {
          if (activeFilters.wName && !w.name.toLowerCase().includes(activeFilters.wName)) return false;
          if (activeFilters.wType !== 'all' && w.weaponType !== activeFilters.wType) return false;
          if (activeFilters.wRarity !== 'all' && String(w.rarity) !== activeFilters.wRarity) return false;
          if (activeFilters.wAscensionStat !== 'all' && w.ascensionStat !== activeFilters.wAscensionStat) return false;
          if (activeFilters.wReleaseVersion !== 'all' && w.releaseVersionLabel !== activeFilters.wReleaseVersion) return false;
          if (activeFilters.wDistributed !== 'all' && String(w.isDistributed) !== activeFilters.wDistributed) return false;
          
          if (!matchesAllFields(w, activeFilters.wQuery)) return false;
          return true;
        });
      }

      if (items.length === 0) {
        grid.innerHTML = '<p class="empty-msg">該当するデータがありません。</p>';
        return;
      }

      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'db-card rarity-' + item.rarity;
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', '0');

        const thumbWrap = document.createElement('div');
        thumbWrap.className = 'card-thumb-wrap';
        thumbWrap.appendChild(buildImageNode(item, 'card-thumb'));

        const name = document.createElement('div');
        name.className = 'card-name';
        name.textContent = item.name;

        card.appendChild(thumbWrap);
        card.appendChild(name);
        card.addEventListener('click', () => showDetail(item, card));
        card.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            showDetail(item, card);
          }
        });
        grid.appendChild(card);
      });
    }

    function showDetail(item, selectedCard) {
      document.querySelectorAll('.db-card').forEach(card => card.classList.toggle('active', card === selectedCard));
      document.getElementById('detailTitle').textContent = item.name + ' の詳細';
      const detailGrid = document.getElementById('detailGrid');
      const detailSummary = document.getElementById('detailSummary');
      const detailImageWrap = document.getElementById('detailImageWrap');
      detailGrid.innerHTML = '';
      detailSummary.innerHTML = '';
      detailImageWrap.innerHTML = '';
      detailImageWrap.appendChild(buildImageNode(item, 'db-modal-image'));

      [
        ['名前', item.name],
        ['レアリティ', `★${item.rarity}`],
        [currentTab === 'character' ? '元素' : '武器種', currentTab === 'character' ? item.element : item.weaponType],
      ].forEach(([label, value]) => {
        const line = document.createElement('p');
        line.textContent = `${label}: ${value}`;
        detailSummary.appendChild(line);
      });

      const entries = getDetailEntries(item);
      entries.forEach(([label, value]) => {
        if (value === undefined || value === null || value === '') return;
        const box = document.createElement('div');
        box.className = 'db-detail-item';
        box.innerHTML = `<b>${label}</b><span>${value}</span>`;
        detailGrid.appendChild(box);
      });
      openDetailModal();
    }

    function getDetailEntries(item) {
      if (currentTab === 'character') {
        return [
          ['所属', item.country],
          ['誕生日', item.birthday],
          ['体型', item.bodyLabel],
          ['基礎攻撃力', item.baseAtkLabel || item.baseAtk],
          ['基礎HP', item.baseHpLabel || item.baseHp],
          ['基礎防御力', item.baseDefLabel || item.baseDef],
          ['役割', (item.role || []).filter(Boolean).join(' / ')],
          ['元素エネルギー', item.energy],
          ['突破ステータス', item.ascensionStat],
          ['特産品', item.localSpecialty],
          ['突破ボス素材', item.talentBoss],
          ['天賦本', item.talentBook],
          ['週ボス素材', item.talentWeekly],
          ['敵素材', item.enemyMaterial],
          ['オリジナル料理', item.specialDish],
          ['配布キャラ', item.distributed ? 'はい' : 'いいえ'],
          ['衣装', item.costume ? 'あり' : 'なし'],
          ['軌跡の有無', item.trace ? 'あり' : 'なし'],
          ['鍛錬の道', item.trainingRoad ? 'あり' : 'なし'],
          ['実装バージョン', item.releaseVersionLabel],
        ];
      }

      return [
        ['武器種', item.weaponType],
        ['基礎攻撃力', item.baseAtk],
        ['突破ステータス', item.ascensionStat],
        ['配布武器', item.isDistributed ? 'あり' : 'なし'],
        ['武器突破素材', item.weaponBreakMaterial],
        ['敵素材', item.enemyMaterial],
        ['実装バージョン', item.releaseVersionLabel],
      ];
    }

    function matchesAllFields(item, query) {
      if (!query) return true;
      const values = Object.values(item);
      for (const value of values) {
        if (value === null || value === undefined) continue;
        if (Array.isArray(value)) {
          for (const part of value) {
            if (part === null || part === undefined) continue;
            if (String(part).toLowerCase().includes(query)) return true;
          }
          continue;
        }
        if (typeof value === 'boolean') {
          if ((value ? 'あり' : 'なし').includes(query)) return true;
          if ((value ? 'true' : 'false').includes(query)) return true;
          continue;
        }
        if (String(value).toLowerCase().includes(query)) return true;
      }
      return false;
    }

    function bindDetailModal() {
      document.getElementById('detailClose').addEventListener('click', closeDetailModal);
      document.getElementById('detailOverlay').addEventListener('click', closeDetailModal);
    }

    function openDetailModal() {
      document.getElementById('detailModal').classList.remove('hidden');
      document.getElementById('detailOverlay').classList.remove('hidden');
      document.getElementById('detailOverlay').setAttribute('aria-hidden', 'false');
    }

    function closeDetailModal() {
      document.getElementById('detailModal').classList.add('hidden');
      document.getElementById('detailOverlay').classList.add('hidden');
      document.getElementById('detailOverlay').setAttribute('aria-hidden', 'true');
    }

    function buildImageNode(item, className) {
      const wrap = document.createElement('div');
      wrap.className = className === 'card-thumb' ? 'card-thumb-fallback' : 'db-modal-fallback';
      wrap.textContent = currentTab === 'character' ? '👤' : '⚔';

      if (!item.iconUrl) return wrap;

      const image = document.createElement('img');
      image.className = className;
      image.src = item.iconUrl;
      image.alt = item.name;
      image.addEventListener('error', () => image.replaceWith(wrap), { once: true });
      return image;
    }
  </script>
</body>
</html>
